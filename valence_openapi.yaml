openapi: 3.0.3
info:
  title: Brightspace Valence API Expanded Starter Spec
  version: 0.2.0
  description: |
    Expanded starter OpenAPI document assembled from the Brightspace Valence routing table and linked resource pages.
    This version emphasizes operations where the docs explicitly describe request bodies, including JSON and select
    application/x-www-form-urlencoded posts.

    Notes:
    - This is still a starter spec, not a complete Valence contract.
    - Where docs clearly name a body type but do not fully restate every nested field in the same section,
      schemas are intentionally permissive.
    - Some routes use uploads, multipart flows, or query-only inputs and are omitted or simplified.
servers:
  - url: https://{host}
    variables:
      host:
        default: your-brightspace-host.example.com
paths:
  /d2l/api/versions/check:
    post:
      summary: Check whether one or more product versions are supported
      operationId: checkSupportedVersions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportedVersionRequest'
      responses:
        '200':
          description: Supported version response

  /d2l/api/bas/{version}/awards/:
    post:
      summary: Create a new award
      operationId: createAward
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardCreate'
      responses:
        '200':
          description: Award created

  /d2l/api/bas/{version}/awards/{awardId}:
    put:
      summary: Update an award
      operationId: updateAward
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/awardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardUpdate'
      responses:
        '200':
          description: Award updated

  /d2l/api/bas/{version}/library/icons/:
    post:
      summary: Add an icon to the library
      operationId: addAwardIcon
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryInputFileInfo'
      responses:
        '200':
          description: Icon added

  /d2l/api/bas/{version}/library/templates/:
    post:
      summary: Add a certificate template to the library
      operationId: addAwardTemplate
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryInputFileInfo'
      responses:
        '200':
          description: Template added

  /d2l/api/bas/{version}/orgunits/{orgUnitId}/associations/:
    post:
      summary: Associate an award with an org unit
      operationId: createAwardAssociation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardAssociationCreate'
      responses:
        '200':
          description: Association created

  /d2l/api/bas/{version}/orgunits/{orgUnitId}/associations/{associationId}:
    put:
      summary: Update an award association for an org unit
      operationId: updateAwardAssociation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - $ref: '#/components/parameters/associationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardAssociationUpdate'
      responses:
        '200':
          description: Association updated

  /d2l/api/bas/{version}/orgunits/{orgUnitId}/issued/:
    post:
      summary: Issue an award to a user
      operationId: createIssuedAward
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - name: useIssueDateToCalcExpiry
          in: query
          schema:
            type: boolean
          description: Use issue date to calculate expiry date; default true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssuedAwardCreate'
      responses:
        '200':
          description: Issued award created

  /d2l/api/eP/{version}/artifacts/file/new:
    post:
      summary: Create a new file artifact
      operationId: createEpFileArtifact
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpFileArtifact'
      responses:
        '200':
          description: File artifact created

  /d2l/api/eP/{version}/artifact/file/{objectId}:
    post:
      summary: Update an existing file artifact
      operationId: updateEpFileArtifact
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpFileArtifact'
      responses:
        '200':
          description: File artifact updated

  /d2l/api/eP/{version}/artifacts/link/new:
    post:
      summary: Create a new link artifact
      operationId: createEpLinkArtifact
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpUrlArtifact'
      responses:
        '200':
          description: Link artifact created

  /d2l/api/eP/{version}/artifact/link/{objectId}:
    post:
      summary: Update an existing link artifact
      operationId: updateEpLinkArtifact
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpUrlArtifact'
      responses:
        '200':
          description: Link artifact updated

  /d2l/api/eP/{version}/collections/new:
    post:
      summary: Create a new collection
      operationId: createEpCollection
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpCollection'
      responses:
        '200':
          description: Collection created

  /d2l/api/eP/{version}/collection/{objectId}:
    post:
      summary: Update an existing collection
      operationId: updateEpCollection
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpCollection'
      responses:
        '200':
          description: Collection updated

  /d2l/api/eP/{version}/export/new:
    post:
      summary: Start a new export for selected ePortfolio object IDs
      operationId: createEpExport
      parameters:
        - $ref: '#/components/parameters/version'
        - name: includeAssociatedItems
          in: query
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
      responses:
        '200':
          description: Export task created

  /d2l/api/eP/{version}/learningobjective/{objectiveId}:
    post:
      summary: Update an existing learning objective
      operationId: updateEpLearningObjective
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objectiveId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpLearningObjective'
      responses:
        '200':
          description: Learning objective updated

  /d2l/api/eP/{version}/object/comments/new:
    post:
      summary: Create a new comment using a context chain
      operationId: createEpContextComment
      parameters:
        - $ref: '#/components/parameters/version'
        - name: context
          in: query
          required: true
          schema:
            type: string
          description: Context chain of object IDs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: Raw comment text.
      responses:
        '200':
          description: Comment created; returns the new CommentId

  /d2l/api/eP/{version}/object/{objectId}/comments/new:
    post:
      summary: Create a new comment on an ePortfolio object
      operationId: createEpObjectComment
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: Raw comment text.
      responses:
        '200':
          description: Comment created; returns the new CommentId

  /d2l/api/eP/{version}/object/{objectId}/share/new:
    post:
      summary: Share an ePortfolio object to a sharing profile
      operationId: shareEpObject
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EpShareForm'
      responses:
        '200':
          description: Object shared

  /d2l/api/eP/{version}/object/{objectId}/share/delete:
    post:
      summary: Unshare an ePortfolio object from a sharing profile
      operationId: unshareEpObject
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EpShareForm'
      responses:
        '200':
          description: Object unshared

  /d2l/api/eP/{version}/object/{objectId}/tags/add:
    post:
      summary: Add one or more tags to an ePortfolio object
      operationId: addEpObjectTags
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags added

  /d2l/api/eP/{version}/object/{objectId}/tags/remove:
    post:
      summary: Remove one or more tags from an ePortfolio object
      operationId: removeEpObjectTags
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags removed

  /d2l/api/eP/{version}/objects/tags/add:
    post:
      summary: Add one or more tags to a set of ePortfolio objects
      operationId: addEpTagsToObjects
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objects
          in: query
          required: true
          schema:
            type: string
          description: CSV list of EP object IDs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags added

  /d2l/api/eP/{version}/objects/tags/remove:
    post:
      summary: Remove one or more tags from a set of ePortfolio objects
      operationId: removeEpTagsFromObjects
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objects
          in: query
          required: true
          schema:
            type: string
          description: CSV list of EP object IDs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags removed

  /d2l/api/eP/{version}/tags/autocomplete:
    post:
      summary: Match tags by prefix
      operationId: autocompleteEpTags
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Matching tags returned

  /d2l/api/eP/{version}/ignoredusers/add:
    post:
      summary: Add a user to the ignored-user list
      operationId: addIgnoredEpUser
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              format: int64
              description: Single user ID as a JSON number.
      responses:
        '200':
          description: User added to ignored list

  /d2l/api/eP/{version}/ignoredusers/remove:
    post:
      summary: Remove a user from the ignored-user list
      operationId: removeIgnoredEpUser
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              format: int64
              description: Single user ID as a JSON number.
      responses:
        '200':
          description: User removed from ignored list

  /d2l/api/eP/{version}/presentations/new:
    post:
      summary: Create a new presentation
      operationId: createEpPresentation
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpPresentation'
      responses:
        '200':
          description: Presentation created

  /d2l/api/eP/{version}/presentation/{objectId}:
    post:
      summary: Update an existing presentation
      operationId: updateEpPresentation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpPresentation'
      responses:
        '200':
          description: Presentation updated

  /d2l/api/eP/{version}/reflections/new:
    post:
      summary: Create a new reflection
      operationId: createEpReflection
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpReflection'
      responses:
        '200':
          description: Reflection created

  /d2l/api/eP/{version}/reflection/{objectId}:
    post:
      summary: Update an existing reflection
      operationId: updateEpReflection
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpReflection'
      responses:
        '200':
          description: Reflection updated

  /d2l/api/le/{version}/{orgUnitId}/agents:
    post:
      summary: Create a new intelligent agent
      operationId: createIntelligentAgent
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgent'
      responses:
        '200':
          description: Intelligent agent created

  /d2l/api/le/{version}/{orgUnitId}/agents/{agentId}:
    put:
      summary: Update an intelligent agent
      operationId: updateIntelligentAgent
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgent'
      responses:
        '200':
          description: Intelligent agent updated

  /d2l/api/le/{version}/{orgUnitId}/agents/{agentId}/runs:
    post:
      summary: Trigger an intelligent-agent run
      operationId: runIntelligentAgent
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - $ref: '#/components/parameters/agentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunNowData'
      responses:
        '200':
          description: Agent run created

  /d2l/api/le/{version}/{orgUnitId}/agents/categories/:
    post:
      summary: Create a new intelligent-agent category
      operationId: createIntelligentAgentCategory
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentCategory'
      responses:
        '200':
          description: Category created

  /d2l/api/le/{version}/{orgUnitId}/agents/categories/{categoryId}:
    put:
      summary: Update an intelligent-agent category
      operationId: updateIntelligentAgentCategory
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - $ref: '#/components/parameters/categoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentCategory'
      responses:
        '200':
          description: Category updated

components:
  parameters:
    version:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: D2L API version.
    orgUnitId:
      name: orgUnitId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    awardId:
      name: awardId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    associationId:
      name: associationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    objectId:
      name: objectId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    agentId:
      name: agentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    categoryId:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    SupportedVersionRequest:
      type: array
      items:
        type: object
        required: [ProductCode, Version]
        properties:
          ProductCode:
            type: string
          Version:
            type: string

    LibraryInputFileInfo:
      type: object
      description: Input file reference used by awards library uploads.
      additionalProperties: true
      properties:
        FileName:
          type: string
        MediaType:
          type: string
        Url:
          type: string
          format: uri

    AwardExpiryCalculation:
      type: object
      properties:
        Type:
          type: integer
        Day:
          type: integer
        Week:
          type: integer
        Month:
          type: integer
        Year:
          type: integer
        Hour:
          type: integer
        Minute:
          type: integer

    AwardExpiryNotification:
      type: object
      properties:
        Type:
          type: integer
        Value:
          type: integer
          nullable: true

    InputFileInfo:
      type: object
      additionalProperties: true
      properties:
        FileName:
          type: string
        Url:
          type: string
          format: uri
        MediaType:
          type: string

    AwardCreate:
      type: object
      required:
        - AwardType
        - Title
        - Description
      properties:
        AwardType:
          type: integer
        Title:
          type: string
        Description:
          type: string
        ExpiryCalculation:
          $ref: '#/components/schemas/AwardExpiryCalculation'
        ExpiryNotification:
          $ref: '#/components/schemas/AwardExpiryNotification'
        IssuerName:
          type: string
        IssuerUrl:
          type: string
          format: uri
        IssuerContact:
          type: string
        Certificate:
          $ref: '#/components/schemas/InputFileInfo'
        Image:
          $ref: '#/components/schemas/InputFileInfo'
        Criteria:
          type: string
          nullable: true

    AwardUpdate:
      allOf:
        - $ref: '#/components/schemas/AwardCreate'

    AwardAssociationCreate:
      type: object
      required: [AwardId, HiddenAward]
      properties:
        AwardId:
          type: integer
          format: int64
        Credit:
          type: number
          nullable: true
        HiddenAward:
          type: boolean

    AwardAssociationUpdate:
      type: object
      required: [HiddenAward]
      properties:
        Credit:
          type: number
          nullable: true
        HiddenAward:
          type: boolean

    IssuedAwardCreate:
      type: object
      required: [AwardId, IssuedToUserId, Criteria, Evidence]
      properties:
        AwardId:
          type: integer
          format: int64
        IssuedToUserId:
          type: integer
          format: int64
        Criteria:
          type: string
        Evidence:
          type: string
        IssuedDate:
          type: string
          format: date-time
          nullable: true

    EpTagObject:
      type: object
      properties:
        Text:
          type: string
        Type:
          type: integer
      additionalProperties: true

    EpGeoTag:
      type: object
      properties:
        Latitude:
          type: number
        Longitude:
          type: number
      additionalProperties: true

    EpObject:
      type: object
      properties:
        ObjectId:
          type: integer
          format: int64
        Name:
          type: string
        Description:
          type: string
        Tags:
          type: array
          items:
            $ref: '#/components/schemas/EpTagObject'
        GeoTag:
          $ref: '#/components/schemas/EpGeoTag'
        AllowComments:
          type: boolean
      additionalProperties: true

    EpFileArtifact:
      allOf:
        - $ref: '#/components/schemas/EpObject'
        - type: object
          properties:
            FileSize:
              type: integer
              format: int64
            FileName:
              type: string
            Extension:
              type: string
            UploadKey:
              type: string

    EpUrlArtifact:
      allOf:
        - $ref: '#/components/schemas/EpObject'
        - type: object
          properties:
            Url:
              type: string
              format: uri

    EpCollection:
      allOf:
        - $ref: '#/components/schemas/EpObject'

    EpLearningObjective:
      allOf:
        - $ref: '#/components/schemas/EpObject'

    EpShareForm:
      type: object
      required: [profileTargetId, profileType]
      properties:
        profileTargetId:
          type: string
        profileType:
          type: string

    EpPresentation:
      allOf:
        - $ref: '#/components/schemas/EpObject'
        - type: object
          properties:
            BannerTitle:
              type: string
            BannerDescription:
              type: string

    EpReflection:
      allOf:
        - $ref: '#/components/schemas/EpObject'
        - type: object
          description: Reflection descriptions may contain light HTML markup.

    IntelligentAgent:
      type: object
      properties:
        AgentId:
          type: integer
          format: int64
          nullable: true
        Name:
          type: string
        Description:
          type: string
        IsEnabled:
          type: boolean
        Schedule:
          $ref: '#/components/schemas/IntelligentAgentSchedule'
        Action:
          $ref: '#/components/schemas/IntelligentAgentAction'
        Condition:
          $ref: '#/components/schemas/IntelligentAgentCondition'
        LastRunDate:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        NextRunDate:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        CategoryId:
          type: integer
          format: int64
          nullable: true
      additionalProperties: true

    IntelligentAgentSchedule:
      type: object
      properties:
        IsEnabled:
          type: boolean
        Type:
          type: integer
          nullable: true
        StartDate:
          type: string
          format: date-time
          nullable: true
        EndDate:
          type: string
          format: date-time
          nullable: true
        RepeatsEvery:
          type: integer
          nullable: true
        RepeatsOnDay:
          type: integer
          nullable: true
        RepeatsOnDays:
          type: array
          nullable: true
          items:
            type: string
        RepeatsOnMonth:
          type: integer
          nullable: true

    IntelligentAgentAction:
      type: object
      properties:
        RepeatType:
          type: integer
        EmailAction:
          $ref: '#/components/schemas/IntelligentAgentEmailAction'
        EnrollmentAction:
          $ref: '#/components/schemas/IntelligentAgentEnrollmentAction'

    IntelligentAgentEmailAction:
      type: object
      properties:
        IsEnabled:
          type: boolean
        To:
          type: string
          nullable: true
        Cc:
          type: string
          nullable: true
        Bcc:
