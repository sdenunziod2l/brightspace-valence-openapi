openapi: 3.1.0
info:
  title: Brightspace Valence API
  version: 0.4.0-production-ready
  description: Production-oriented OpenAPI document for the Brightspace Valence API.
    This version adds reusable security schemes, reusable path parameters, operationIds,
    baseline response components, and normalized request/response envelopes. It is
    built from the Brightspace HTTP routing table and linked resource pages.
servers:
- url: https://your-brightspace-instance.example.com
paths:
  /d2l/api/{productCode}/versions/:
    get:
      summary: Get product versions
      tags:
      - API Properties
      responses:
        '200':
          description: Supported versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVersions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getD2lApiByProductCodeVersions
      security:
      - OAuth2:
        - core:*:*
    parameters:
    - $ref: '#/components/parameters/ProductCode'
  /d2l/api/{productCode}/versions/{version}:
    get:
      summary: Check product version support
      tags:
      - API Properties
      responses:
        '200':
          description: Version support details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedVersion'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getD2lApiByProductCodeVersionsByVersion
      security:
      - OAuth2:
        - core:*:*
    parameters:
    - $ref: '#/components/parameters/ProductCode'
    - $ref: '#/components/parameters/Version'
  /d2l/api/versions/:
    get:
      summary: Get all API versions
      tags:
      - API Properties
      responses:
        '200':
          description: Supported versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductVersions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '401':
          $ref: '#/components/responses/Unauthorized'
      operationId: getD2lApiVersions
      security:
      - OAuth2:
        - core:*:*
  /d2l/api/versions/check:
    post:
      summary: Bulk version support check
      tags:
      - API Properties
      responses:
        '200':
          description: Bulk version support response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedVersionBulkResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '401':
          $ref: '#/components/responses/Unauthorized'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VersionSupportedVersionRequest'
        required: true
        description: Request payload for `Bulk version support check`.
      operationId: postD2lApiVersionsCheck
      security:
      - OAuth2:
        - core:*:*
