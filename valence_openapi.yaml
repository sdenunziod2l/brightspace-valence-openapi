openapi: 3.0.3
info:
  title: Brightspace Valence API Starter Spec
  version: 0.1.0
  description: |
    Starter OpenAPI document assembled from the Brightspace Valence routing table and linked resource pages.
    It focuses on routes where the docs explicitly describe POST/PUT request bodies.

    Notes:
    - Paths preserve the documentation placeholders like (version) and (orgUnitId) as OpenAPI path params.
    - Many Brightspace models inherit from broader base objects in the docs; where the base object was not fully captured here,
      this starter spec keeps the schema intentionally permissive.
    - Several documented actions use query/form/multipart inputs instead of JSON bodies; those are omitted or simplified.
servers:
  - url: https://{host}
    variables:
      host:
        default: your-brightspace-host.example.com
paths:
  /d2l/api/versions/check:
    post:
      summary: Check whether one or more product versions are supported
      operationId: checkSupportedVersions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportedVersionRequest'
      responses:
        '200':
          description: Supported version response
  /d2l/api/bas/{version}/awards/:
    post:
      summary: Create a new award
      operationId: createAward
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardCreate'
      responses:
        '200':
          description: Award created
  /d2l/api/bas/{version}/awards/{awardId}:
    put:
      summary: Update an award
      operationId: updateAward
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/awardId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardUpdate'
      responses:
        '200':
          description: Award updated
  /d2l/api/bas/{version}/library/icons/:
    post:
      summary: Add an icon to the library
      operationId: addAwardIcon
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryInputFileInfo'
      responses:
        '200':
          description: Icon added
  /d2l/api/bas/{version}/library/templates/:
    post:
      summary: Add a certificate template to the library
      operationId: addAwardTemplate
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryInputFileInfo'
      responses:
        '200':
          description: Template added
  /d2l/api/bas/{version}/orgunits/{orgUnitId}/associations/:
    post:
      summary: Associate an award with an org unit
      operationId: createAwardAssociation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardAssociationCreate'
      responses:
        '200':
          description: Association created
  /d2l/api/bas/{version}/orgunits/{orgUnitId}/associations/{associationId}:
    put:
      summary: Update an award association for an org unit
      operationId: updateAwardAssociation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - $ref: '#/components/parameters/associationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AwardAssociationUpdate'
      responses:
        '200':
          description: Association updated
  /d2l/api/eP/{version}/artifact/file/{objectId}:
    post:
      summary: Update an existing file artifact
      operationId: updateEpFileArtifact
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpFileArtifact'
      responses:
        '200':
          description: File artifact updated
  /d2l/api/eP/{version}/artifacts/link/new:
    post:
      summary: Create a new link artifact
      operationId: createEpLinkArtifact
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpUrlArtifact'
      responses:
        '200':
          description: Link artifact created
  /d2l/api/eP/{version}/artifact/link/{objectId}:
    post:
      summary: Update an existing link artifact
      operationId: updateEpLinkArtifact
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpUrlArtifact'
      responses:
        '200':
          description: Link artifact updated
  /d2l/api/eP/{version}/collection/{objectId}:
    post:
      summary: Update an existing collection
      operationId: updateEpCollection
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpCollection'
      responses:
        '200':
          description: Collection updated
  /d2l/api/eP/{version}/collections/new:
    post:
      summary: Create a new collection
      operationId: createEpCollection
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpCollection'
      responses:
        '200':
          description: Collection created
  /d2l/api/eP/{version}/export/new:
    post:
      summary: Start a new export for selected ePortfolio object IDs
      operationId: createEpExport
      parameters:
        - $ref: '#/components/parameters/version'
        - name: includeAssociatedItems
          in: query
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
                format: int64
      responses:
        '200':
          description: Export task created
  /d2l/api/eP/{version}/learningobjective/{objectiveId}:
    post:
      summary: Update an existing learning objective
      operationId: updateEpLearningObjective
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objectiveId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpLearningObjective'
      responses:
        '200':
          description: Learning objective updated
  /d2l/api/eP/{version}/object/{objectId}/comments/new:
    post:
      summary: Add a comment to an ePortfolio object
      operationId: createEpObjectComment
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpComment'
      responses:
        '200':
          description: Comment created
  /d2l/api/eP/{version}/object/{objectId}/tags/add:
    post:
      summary: Add tags to an ePortfolio object
      operationId: addEpObjectTags
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags added
  /d2l/api/eP/{version}/object/{objectId}/tags/remove:
    post:
      summary: Remove tags from an ePortfolio object
      operationId: removeEpObjectTags
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags removed
  /d2l/api/eP/{version}/objects/tags/add:
    post:
      summary: Add tags to a set of ePortfolio objects
      operationId: addEpTagsToObjects
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objects
          in: query
          required: true
          schema:
            type: string
          description: CSV list of EP object IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags added
  /d2l/api/eP/{version}/objects/tags/remove:
    post:
      summary: Remove tags from a set of ePortfolio objects
      operationId: removeEpTagsFromObjects
      parameters:
        - $ref: '#/components/parameters/version'
        - name: objects
          in: query
          required: true
          schema:
            type: string
          description: CSV list of EP object IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tags removed
  /d2l/api/eP/{version}/tags/autocomplete:
    post:
      summary: Match a tag template against known tags
      operationId: autocompleteEpTags
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpTagObject'
      responses:
        '200':
          description: Tag matches returned
  /d2l/api/eP/{version}/ignoredusers/add:
    post:
      summary: Add a user to the calling user's ignored list
      operationId: addIgnoredUser
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              format: int64
      responses:
        '200':
          description: Ignored user added
  /d2l/api/eP/{version}/ignoredusers/remove:
    post:
      summary: Remove a user from the calling user's ignored list
      operationId: removeIgnoredUser
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: integer
              format: int64
      responses:
        '200':
          description: Ignored user removed
  /d2l/api/eP/{version}/presentation/{objectId}:
    post:
      summary: Update an existing presentation
      operationId: updateEpPresentation
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpPresentation'
      responses:
        '200':
          description: Presentation updated
  /d2l/api/eP/{version}/presentations/new:
    post:
      summary: Create a new presentation
      operationId: createEpPresentation
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpPresentation'
      responses:
        '200':
          description: Presentation created
  /d2l/api/eP/{version}/reflection/{objectId}:
    post:
      summary: Update an existing reflection
      operationId: updateEpReflection
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/objectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpReflection'
      responses:
        '200':
          description: Reflection updated
  /d2l/api/eP/{version}/reflections/new:
    post:
      summary: Create a new reflection
      operationId: createEpReflection
      parameters:
        - $ref: '#/components/parameters/version'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpReflection'
      responses:
        '200':
          description: Reflection created
  /d2l/api/le/{version}/{orgUnitId}/agents:
    post:
      summary: Create a new intelligent agent
      operationId: createIntelligentAgent
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentData'
      responses:
        '200':
          description: Agent created
  /d2l/api/le/{version}/{orgUnitId}/agents/{agentId}:
    put:
      summary: Update an existing intelligent agent
      operationId: updateIntelligentAgent
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentData'
      responses:
        '200':
          description: Agent updated
  /d2l/api/le/{version}/{orgUnitId}/agents/categories/:
    post:
      summary: Create a new intelligent agent category
      operationId: createIntelligentAgentCategory
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentCategoryData'
      responses:
        '200':
          description: Category created
  /d2l/api/le/{version}/{orgUnitId}/agents/categories/{categoryId}:
    put:
      summary: Update an intelligent agent category
      operationId: updateIntelligentAgentCategory
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - name: categoryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntelligentAgentCategoryData'
      responses:
        '200':
          description: Category updated
  /d2l/api/le/{version}/ltiadvantage/links/organization/{linkId}:
    put:
      summary: Update an organization-level LTI Advantage link
      operationId: updateOrgLtiAdvantageLink
      parameters:
        - $ref: '#/components/parameters/version'
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LtiCreateLinkData'
      responses:
        '200':
          description: Link updated
  /d2l/api/le/{version}/ltiadvantage/links/orgunit/{orgUnitId}/{linkId}:
    put:
      summary: Update an org unit-level LTI Advantage link
      operationId: updateOrgUnitLtiAdvantageLink
      parameters:
        - $ref: '#/components/parameters/version'
        - $ref: '#/components/parameters/orgUnitId'
        - name: linkId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LtiCreateLinkData'
      responses:
        '200':
          description: Link updated
components:
  parameters:
    version:
      name: version
      in: path
      required: true
      schema:
        type: string
      description: Brightspace API version string.
    orgUnitId:
      name: orgUnitId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    objectId:
      name: objectId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    awardId:
      name: awardId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    associationId:
      name: associationId
      in: path
      required: true
      schema:
        type: integer
        format: int64
  schemas:
    SupportedVersionRequest:
      type: object
      required: [ProductCode, Version]
      properties:
        ProductCode:
          type: string
        Version:
          type: string
    AwardExpiryCalculation:
      type: object
      additionalProperties: true
      description: Placeholder for Awards.ExpiryCalculation.
    AwardExpiryNotification:
      type: object
      additionalProperties: true
      description: Placeholder for Awards.ExpiryNotification.
    AwardInputFileInfo:
      type: object
      additionalProperties: true
      description: Placeholder for Awards.InputFileInfo.
    LibraryInputFileInfo:
      type: object
      additionalProperties: true
      description: Placeholder for Awards.LibraryInputFileInfo.
    AwardCreate:
      type: object
      required:
        - AwardType
        - Title
        - Description
        - ExpiryCalculation
        - ExpiryNotification
        - IssuerName
        - IssuerUrl
        - IssuerContact
        - Image
      properties:
        AwardType:
          type: integer
          description: AWARD_T; badge=1, certificate=2 in the docs.
        Title:
          type: string
        Description:
          type: string
        ExpiryCalculation:
          $ref: '#/components/schemas/AwardExpiryCalculation'
        ExpiryNotification:
          $ref: '#/components/schemas/AwardExpiryNotification'
        IssuerName:
          type: string
        IssuerUrl:
          type: string
          format: uri
        IssuerContact:
          type: string
        Certificate:
          oneOf:
            - $ref: '#/components/schemas/AwardInputFileInfo'
            - type: 'null'
        Image:
          $ref: '#/components/schemas/AwardInputFileInfo'
        Criteria:
          type: string
          nullable: true
    AwardUpdate:
      type: object
      properties:
        Title:
          type: string
        Description:
          type: string
        ExpiryCalculation:
          $ref: '#/components/schemas/AwardExpiryCalculation'
        ExpiryNotification:
          $ref: '#/components/schemas/AwardExpiryNotification'
        IssuerName:
          type: string
        IssuerUrl:
          type: string
          format: uri
        IssuerContact:
          type: string
        Certificate:
          $ref: '#/components/schemas/AwardInputFileInfo'
        Image:
          $ref: '#/components/schemas/AwardInputFileInfo'
        Criteria:
          type: string
          nullable: true
    AwardAssociationCreate:
      type: object
      required: [AwardId, HiddenAward]
      properties:
        AwardId:
          type: integer
          format: int64
        Credit:
          type: number
          format: double
          nullable: true
        HiddenAward:
          type: boolean
    AwardAssociationUpdate:
      type: object
      required: [HiddenAward]
      properties:
        Credit:
          type: number
          format: double
          nullable: true
        HiddenAward:
          type: boolean
    EpBaseObject:
      type: object
      properties:
        ObjectId:
          type: integer
          format: int64
        Name:
          type: string
        Description:
          type: string
        ObjectTypeId:
          type: integer
        OwnerId:
          type: integer
          format: int64
      additionalProperties: true
      description: Permissive base for EP.EpObject-derived structures.
    EpFileArtifact:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          properties:
            FileSize:
              type: integer
            FileName:
              type: string
            Extension:
              type: string
            UploadKey:
              type: string
    EpUrlArtifact:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          properties:
            Url:
              type: string
              format: uri
          additionalProperties: true
    EpCollection:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          properties:
            ItemsCount:
              type: integer
            ItemIds:
              type: array
              items:
                type: integer
                format: int64
            Items:
              type: array
              items:
                $ref: '#/components/schemas/EpBaseObject'
    EpLearningObjective:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          description: Learning objective derives from EP.EpObject with its own ObjectTypeId.
    EpComment:
      type: object
      properties:
        ObjectId:
          type: integer
          format: int64
        CommentId:
          type: integer
          format: int64
        UserId:
          type: integer
          format: int64
        CreatedDate:
          type: string
          format: date-time
          nullable: true
        Body:
          type: string
    EpTagObject:
      type: object
      required: [Text, Type]
      properties:
        Text:
          type: string
        Type:
          type: integer
    EpPresentation:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          properties:
            BannerTitle:
              type: string
            BannerDescription:
              type: string
    EpReflection:
      allOf:
        - $ref: '#/components/schemas/EpBaseObject'
        - type: object
          description: Reflection derives from EP.EpObject; Description expects light HTML per docs.
    IntelligentAgentDateCondition:
      type: object
      properties:
        Type:
          type: integer
        Days:
          type: integer
      additionalProperties: true
    IntelligentAgentReleaseCondition:
      type: object
      properties:
        ConditionSetId:
          type: integer
          format: int64
      additionalProperties: true
    IntelligentAgentScheduleData:
      type: object
      properties:
        IsEnabled:
          type: boolean
        Type:
          type: integer
          nullable: true
        StartDate:
          type: string
          format: date-time
          nullable: true
        EndDate:
          type: string
          format: date-time
          nullable: true
        RepeatsEvery:
          type: integer
          nullable: true
        RepeatsOnDay:
          type: integer
          nullable: true
        RepeatsOnDays:
          type: array
          nullable: true
          items:
            type: string
        RepeatsOnMonth:
          type: integer
          nullable: true
    IntelligentAgentActionData:
      type: object
      additionalProperties: true
      description: Placeholder for IntelligentAgents.ActionData.
    IntelligentAgentConditionData:
      type: object
      properties:
        LoginActivity:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentDateCondition'
            - type: 'null'
        CourseActivity:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentDateCondition'
            - type: 'null'
        ReleaseCondition:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentReleaseCondition'
            - type: 'null'
        RoleIds:
          type: array
          nullable: true
          items:
            type: integer
            format: int64
    IntelligentAgentData:
      type: object
      properties:
        AgentId:
          type: integer
          format: int64
          nullable: true
        Name:
          type: string
        Description:
          type: string
        IsEnabled:
          type: boolean
        Schedule:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentScheduleData'
            - type: 'null'
        Action:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentActionData'
            - type: 'null'
        Condition:
          oneOf:
            - $ref: '#/components/schemas/IntelligentAgentConditionData'
            - type: 'null'
        LastRunDate:
          type: string
          format: date-time
          nullable: true
        NextRunDate:
          type: string
          format: date-time
          nullable: true
        CategoryId:
          type: integer
          format: int64
          nullable: true
    IntelligentAgentCategoryData:
      type: object
      properties:
        CategoryId:
          type: integer
          format: int64
          nullable: true
        Name:
          type: string
      additionalProperties: true
    LtiCreateLinkData:
      type: object
      additionalProperties: true
      description: Placeholder for LTI.CreateLTIAdvantageLinkData.
